<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебе</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.container{
text-align:center;
}

button{
padding:15px 30px;
margin:10px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#555;
color:white;
position:absolute;
}

#final{
display:none;
text-align:center;
animation:show 2s forwards;
}

img{
max-width:350px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(255,0,100,0.5);
}

@keyframes show{
from{opacity:0; transform:scale(0.8)}
to{opacity:1; transform:scale(1)}
}

</style>

</head>

<body>

<div class="container" id="question">
<h1>Скучила за мною?</h1>

<button id="yes">Так</button>
<button id="no">Ні</button>

</div>

<div id="final">

<h1>Обожнюю тебе пані дружина ❤️</h1>

<img src="photo.jpg">

</div>

<script>

let no = document.getElementById("no")
let count = 0

no.addEventListener("mouseover", function(){

if(count < 4){
no.style.top = Math.random() * (window.innerHeight - 100) + "px"
no.style.left = Math.random() * (window.innerWidth - 100) + "px"
count++
}

else{
document.getElementById("question").innerHTML = `
<h1>Не обманюй 😜</h1>
<button onclick="showFinal()">Ладно скучила</button>
`
}

})

document.getElementById("yes").onclick = showFinal

function showFinal(){
document.getElementById("question").style.display="none"
document.getElementById("final").style.display="block"
}

</script>

</body>
</html>
